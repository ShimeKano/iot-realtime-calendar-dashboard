<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AQI Big Data Time-Series Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg-dark:       #0f172a;
      --bg-card:       #1e293b;
      --bg-inner:      #0f172a;
      --accent:        #38bdf8;
      --accent-hover:  #0ea5e9;
      --accent-dim:    rgba(56,189,248,0.15);
      --text-primary:  #f1f5f9;
      --text-secondary:#94a3b8;
      --text-muted:    #64748b;
      --border:        #334155;
      --success:       #4ade80;
      --warning:       #facc15;
      --error:         #f87171;
      --radius-sm:     6px;
      --radius-md:     12px;
      --radius-lg:     16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .dashboard { max-width: 1100px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .header-icon { font-size: 34px; }
    .header-text h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.3;
    }
    .header-text p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* ── Controls grid ── */
    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input[type="date"],
    select {
      background: var(--bg-inner);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s;
    }
    input[type="date"]:focus,
    select:focus { outline: none; border-color: var(--accent); }

    /* ── Segmented buttons ── */
    .segmented {
      display: flex;
      background: var(--bg-inner);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .segmented button {
      flex: 1;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      padding: 9px 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .segmented button:hover {
      background: var(--accent-dim);
      color: var(--text-primary);
    }
    .segmented button.active {
      background: var(--accent);
      color: #0f172a;
      font-weight: 700;
    }

    /* ── Load button ── */
    .btn-load {
      background: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-load:hover { background: var(--accent-hover); }
    .btn-load:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border);
      min-height: 40px;
      color: var(--text-secondary);
    }
    .status-bar.loading { border-color: var(--accent);   color: var(--accent);   }
    .status-bar.success { border-color: var(--success);  color: var(--success);  }
    .status-bar.warning { border-color: var(--warning);  color: var(--warning);  }
    .status-bar.error   { border-color: var(--error);    color: var(--error);    }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Chart card ── */
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
      margin-top: 16px;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .chart-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .chart-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .chart-container {
      position: relative;
      height: 340px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding-top: 8px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .controls-grid { grid-template-columns: 1fr; }
      .segmented button { padding: 9px 4px; font-size: 12px; }
    }
  </style>
</head>

<body>
<div class="dashboard">

  <!-- Header -->
  <div class="header">
    <span class="header-icon">📈</span>
    <div class="header-text">
      <h1>AQI Big Data Time-Series Dashboard</h1>
      <p>Giám sát chất lượng không khí theo thời gian thực</p>
    </div>
  </div>

  <!-- Controls card -->
  <div class="card">
    <div class="card-title">Bộ lọc dữ liệu</div>
    <div class="controls-grid">

      <div class="field">
        <label>📅 Ngày</label>
        <input type="date" id="datePicker" />
      </div>

      <div class="field">
        <label>📊 Chỉ số</label>
        <select id="metric">
          <option value="pm25">PM2.5 (µg/m³)</option>
          <option value="aqi">AQI</option>
          <option value="temp">Nhiệt độ (°C)</option>
          <option value="humidity">Độ ẩm (%)</option>
        </select>
      </div>

      <div class="field">
        <label>⏱ Khung thời gian</label>
        <div class="segmented" id="rangeButtons">
          <button data-range="1h">1 giờ</button>
          <button data-range="24h" class="active">24 giờ</button>
          <button data-range="7d">7 ngày</button>
          <button data-range="1m">1 tháng</button>
        </div>
      </div>

      <div class="field">
        <label>&nbsp;</label>
        <button class="btn-load" id="btnLoad" onclick="loadData()">Xem dữ liệu</button>
      </div>

    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar">
    <span class="spinner" id="statusSpinner"></span>
    <span id="statusText">Chọn thông số và nhấn "Xem dữ liệu"</span>
  </div>

  <!-- Chart card -->
  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title" id="chartTitle">Biểu đồ thời gian</div>
        <div class="chart-subtitle" id="chartSubtitle">Chưa tải dữ liệu</div>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <footer>
    ⏱ Dữ liệu được tự động cập nhật mỗi 5 phút &amp; lưu trữ theo thời gian (time-series)
  </footer>

</div>

<script>
  const API_HISTORY = "/api/GetHistory";
  let chart;
  let currentRange = "24h";

  const RANGE_LABELS = {
    "1h":  "1 giờ",
    "24h": "24 giờ",
    "7d":  "7 ngày",
    "1m":  "1 tháng"
  };

  const METRIC_LABELS = {
    "pm25":     "PM2.5 (µg/m³)",
    "aqi":      "AQI",
    "temp":     "Nhiệt độ (°C)",
    "humidity": "Độ ẩm (%)"
  };

  /* ── Utilities ── */

  function padTwo(n) { return String(n).padStart(2, "0"); }

  function toDateStr(date) {
    return date.getFullYear() + "-" +
      padTwo(date.getMonth() + 1) + "-" +
      padTwo(date.getDate());
  }

  function fmtHHmm(val) {
    const d = (val instanceof Date) ? val : new Date(val);
    return padTwo(d.getHours()) + ":" + padTwo(d.getMinutes());
  }

  function fmtDDMM(val) {
    const d = (val instanceof Date) ? val : new Date(val);
    return padTwo(d.getDate()) + "/" + padTwo(d.getMonth() + 1);
  }

  function recordTime(rec) {
    return rec.time || rec.timeISO || null;
  }

  /* ── Status helpers ── */

  function setStatus(type, text, spinning) {
    const bar     = document.getElementById("statusBar");
    const txt     = document.getElementById("statusText");
    const spinner = document.getElementById("statusSpinner");
    bar.className = "status-bar" + (type ? " " + type : "");
    txt.textContent = text;
    spinner.style.display = spinning ? "inline-block" : "none";
  }

  /* ── Placeholder data ── */

  function generatePlaceholder(range) {
    const labels = [], values = [];
    const now = new Date();
    if (range === "1h") {
      for (let i = 11; i >= 0; i--) {
        labels.push(fmtHHmm(new Date(now - i * 5 * 60000)));
        values.push(null);
      }
    } else if (range === "24h") {
      for (let i = 23; i >= 0; i--) {
        const t = new Date(now - i * 3600000);
        labels.push(padTwo(t.getHours()) + ":00");
        values.push(null);
      }
    } else if (range === "7d") {
      for (let i = 6; i >= 0; i--) {
        labels.push(fmtDDMM(new Date(now - i * 86400000)));
        values.push(null);
      }
    } else {
      for (let i = 29; i >= 0; i--) {
        labels.push(fmtDDMM(new Date(now - i * 86400000)));
        values.push(null);
      }
    }
    return { labels, values };
  }

  /* ── Fetch one day's records ── */

  async function fetchDay(dateStr) {
    const res = await fetch(API_HISTORY + "?date=" + dateStr);
    if (!res.ok) throw new Error("HTTP " + res.status + " cho ngày " + dateStr);
    const json = await res.json();
    return Array.isArray(json.data) ? json.data : [];
  }

  /* ── Render chart ── */

  function renderChart(labels, values, metricLabel) {
    const ctx = document.getElementById("chart").getContext("2d");
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: metricLabel,
          data: values,
          borderColor: "#38bdf8",
          backgroundColor: "rgba(56,189,248,0.1)",
          borderWidth: 2,
          tension: 0.35,
          spanGaps: true,
          pointRadius: values.length <= 48 ? 3 : 2,
          pointHoverRadius: 5,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: {
            labels: { color: "#94a3b8", font: { size: 12 } }
          },
          tooltip: {
            backgroundColor: "#1e293b",
            borderColor: "#334155",
            borderWidth: 1,
            titleColor: "#f1f5f9",
            bodyColor: "#94a3b8"
          }
        },
        scales: {
          x: {
            ticks: { color: "#64748b", maxRotation: 45, font: { size: 11 } },
            grid:  { color: "rgba(51,65,85,0.4)" }
          },
          y: {
            beginAtZero: false,
            ticks: { color: "#64748b", font: { size: 11 } },
            grid:  { color: "rgba(51,65,85,0.4)" }
          }
        }
      }
    });
  }

  /* ── Main load function ── */

  async function loadData() {
    const metric       = document.getElementById("metric").value;
    const range        = currentRange;
    const btn          = document.getElementById("btnLoad");
    const now          = new Date();
    const todayStr     = toDateStr(now);
    const selectedDate = document.getElementById("datePicker").value || todayStr;

    btn.disabled = true;
    setStatus("loading", "Đang tải dữ liệu...", true);
    document.getElementById("chartTitle").textContent =
      (METRIC_LABELS[metric] || metric) + " – " + RANGE_LABELS[range];

    try {
      let labels = [], values = [];

      if (range === "1h" || range === "24h") {
        /* ── Single-day fetch ── */
        const hours   = range === "1h" ? 1 : 24;
        const records = await fetchDay(selectedDate);

        if (!records.length) {
          const p = generatePlaceholder(range);
          labels = p.labels; values = p.values;
          setStatus("warning", "⚠️ Chưa có dữ liệu cho ngày này. Hệ thống đang tích lũy dữ liệu.");
          document.getElementById("chartSubtitle").textContent = "Không có dữ liệu";
        } else {
          let cutoff;
          if (selectedDate === todayStr) {
            cutoff = new Date(now.getTime() - hours * 3600000);
          } else {
            const times = records
              .map(r => recordTime(r))
              .filter(Boolean)
              .map(t => new Date(t).getTime())
              .sort((a, b) => b - a);
            cutoff = times.length ? new Date(times[0] - hours * 3600000) : null;
          }

          const filtered = cutoff
            ? records.filter(r => { const t = recordTime(r); return t && new Date(t) >= cutoff; })
            : records.slice();

          if (!filtered.length) {
            const p = generatePlaceholder(range);
            labels = p.labels; values = p.values;
            setStatus("warning", "⚠️ Không có bản ghi trong " + RANGE_LABELS[range] + " này.");
          } else {
            filtered.sort((a, b) => {
              const ta = recordTime(a), tb = recordTime(b);
              return new Date(ta) - new Date(tb);
            });
            labels = filtered.map(r => { const t = recordTime(r); return t ? fmtHHmm(t) : "--:--"; });
            values = filtered.map(r => r[metric] != null ? r[metric] : null);
            setStatus("success", "✅ Đã tải " + filtered.length + " bản ghi (" + RANGE_LABELS[range] + ")");
          }
          document.getElementById("chartSubtitle").textContent =
            "Ngày " + selectedDate.split("-").reverse().join("/");
        }

      } else {
        /* ── Multi-day fetch (7d / 1m) ── */
        const days       = range === "7d" ? 7 : 30;
        const endDate    = new Date(selectedDate + "T23:59:59");
        const allRecords = [];
        const errors     = [];

        setStatus("loading", "Đang tải " + days + " ngày dữ liệu...", true);

        for (let i = days - 1; i >= 0; i--) {
          const ds = toDateStr(new Date(endDate.getTime() - i * 86400000));
          try {
            const recs = await fetchDay(ds);
            allRecords.push(...recs);
          } catch (_) {
            errors.push(ds);
          }
        }

        if (!allRecords.length) {
          const p = generatePlaceholder(range);
          labels = p.labels; values = p.values;
          setStatus("warning", "⚠️ Chưa có dữ liệu trong " + RANGE_LABELS[range] + " này.");
          document.getElementById("chartSubtitle").textContent = "Không có dữ liệu";
        } else {
          allRecords.sort((a, b) => {
            const ta = recordTime(a), tb = recordTime(b);
            if (!ta) return 1; if (!tb) return -1;
            return new Date(ta) - new Date(tb);
          });
          labels = allRecords.map(r => { const t = recordTime(r); return t ? fmtDDMM(t) : "--"; });
          values = allRecords.map(r => r[metric] != null ? r[metric] : null);
          const errNote = errors.length ? " (" + errors.length + " ngày lỗi)" : "";
          setStatus("success",
            "✅ Đã tải " + allRecords.length + " bản ghi – " + RANGE_LABELS[range] + errNote);
          document.getElementById("chartSubtitle").textContent =
            days + " ngày gần nhất tính từ " + selectedDate.split("-").reverse().join("/");
        }
      }

      renderChart(labels, values, METRIC_LABELS[metric] || metric);

    } catch (err) {
      console.error(err);
      const p = generatePlaceholder(range);
      renderChart(p.labels, p.values, METRIC_LABELS[metric] || metric);
      setStatus("error", "❌ Lỗi khi tải dữ liệu. Vui lòng thử lại.");
      document.getElementById("chartSubtitle").textContent = "Lỗi tải dữ liệu";
    } finally {
      btn.disabled = false;
    }
  }

  /* ── Segmented button logic ── */

  document.getElementById("rangeButtons").addEventListener("click", function (e) {
    const btn = e.target.closest("button[data-range]");
    if (!btn) return;
    currentRange = btn.dataset.range;
    document.querySelectorAll("#rangeButtons button").forEach(function (b) {
      b.classList.remove("active");
    });
    btn.classList.add("active");
  });

  /* ── Init: default to today, load, auto-refresh every 5 min ── */

  window.addEventListener("load", function () {
    document.getElementById("datePicker").value = toDateStr(new Date());
    loadData();
    setInterval(loadData, 5 * 60 * 1000);
  });
</script>

</body>
</html>
